<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Uphar CRM - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">

                    "inverse-on-surface": "#f0f1f3",
                    "secondary-fixed": "#ffdf9f",
                    "inverse-surface": "#2e3132",
                    "tertiary-container": "#444b58",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed-variant": "#173bab",
                    "outline": "#757684",
                    "on-secondary-fixed": "#261a00",
                    "inverse-primary": "#b8c4ff",
                    "primary": "#00288e",
                    "on-primary-fixed": "#001453",
                    "on-surface": "#191c1e",
                    "tertiary": "#2d3441",
                    "surface-bright": "#f8f9fb",
                    "background": "#f8f9fb",
                    "primary-fixed": "#dde1ff",
                    "on-primary": "#ffffff",
                    "error": "#ba1a1a",
                    "outline-variant": "#c4c5d5",
                    "secondary-fixed-dim": "#f9bd22",
                    "secondary-container": "#ffc329",
                    "on-surface-variant": "#444653",
                    "on-secondary-fixed-variant": "#5c4300",
                    "error-container": "#ffdad6",
                    "surface-container": "#edeef0",
                    "secondary": "#795900",
                    "on-tertiary-container": "#b4bbca",
                    "on-background": "#191c1e",
                    "tertiary-fixed-dim": "#c0c7d6",
                    "surface-variant": "#e1e2e4",
                    "on-tertiary-fixed-variant": "#404754",
                    "surface": "#f8f9fb",
                    "primary-fixed-dim": "#b8c4ff",
                    "on-error-container": "#93000a",
                    "surface-tint": "#3755c3",
                    "on-secondary-container": "#6f5100",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-fixed": "#151c27",
                    "on-secondary": "#ffffff",
                    "on-error": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "gutter": "16px",
                    "xs": "4px",
                    "xl": "32px",
                    "sm": "8px",
                    "base": "4px",
                    "md": "16px",
                    "lg": "24px",
                    "container-margin": "24px"
            },
            "fontFamily": {
                    "label-md": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "label-sm": ["Inter"],
                    "body-sm": ["Inter"],
                    "display-lg": ["Inter"],

                    "body-lg": ["Inter"],

            "fontSize": {

                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],

          }
        }

    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-md text-on-surface">
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl border border-outline-variant/30 overflow-hidden shadow-sm">
<!-- Header Section -->
<div class="px-xl pt-xl pb-md flex flex-col items-center">
<div class="w-16 h-16 bg-primary-fixed rounded-xl flex items-center justify-center mb-md border border-primary/10">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">
                    diversity_3
                </span>
</div>
<h1 class="font-display-lg text-display-lg text-primary text-center tracking-tight">Uphar CRM</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-xs">Specimen Distribution CRM</p>
<div class="w-12 h-[2px] bg-primary mt-lg rounded-full"></div>
</div>
<!-- Form Section -->
<div class="px-xl pb-xl">
<h2 class="font-headline-md text-headline-md mb-lg text-center">Sign In</h2>
<form action="#" class="space-y-md" method="POST">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-sm" for="email">Email or Username</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-[20px]">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg font-body-md text-body-md bg-surface-container-lowest text-on-surface placeholder-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200" id="email" name="email" placeholder="user@upharcrm.com" required="" type="text">
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-sm" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2 border border-outline-variant rounded-lg font-body-md text-body-md bg-surface-container-lowest text-on-surface placeholder-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-primary transition-colors focus:outline-none" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined text-[20px]" id="visibility-icon">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between mt-sm mb-lg">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded bg-surface-container-lowest cursor-pointer" id="remember-me" name="remember-me" type="checkbox">
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember-me">
                            Remember me
                        </label>
</div>
<div class="text-body-sm">
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
</div>
<button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200" type="submit">
                    Sign In
                </button>
</form>
<div class="mt-xl text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Secure access restricted to authorized Uphar personnel.
                </p>
</div>
</div>
</div>
<script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibility-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility';
            }
        }
    </script>
</body></html>
